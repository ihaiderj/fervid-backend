services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fervid
      POSTGRES_USER: fervid
      POSTGRES_PASSWORD: fervid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fervid"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DB_ENGINE: postgresql
      DB_NAME: fervid
      DB_USER: fervid
      DB_PASSWORD: fervid
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: change-me-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,web
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
